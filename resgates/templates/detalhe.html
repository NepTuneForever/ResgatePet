<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ animal.nome }}</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #f2f2f2;
}

.header {
  background: #2f5d8c;
  color: white;
  padding: 16px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
}

img {
  width: 100px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.nome {
  font-size: 22px;
  font-weight: bold;
}

.info {
  color: #666;
}

.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px;
  background: #2f5d8c;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="header">
  <h1>🐾 Detalhes</h1>
</div>

<div class="container">
  <div class="card">

    {% if animal.foto %}
      <img src="{{ animal.foto }}">
    {% endif %}

    <div class="nome">{{ animal.nome }}</div>
    <div class="info">{{ animal.tipo }} • {{ animal.idade }} anos</div>
    <div class="info">📍 {{ animal.localizacao }}</div>
    <div class="info">📞 {{ animal.contato }}</div>

    <p>{{ animal.caracteristicas }}</p>

    <a href="/animais/" class="btn">Voltar</a>

  </div>
</div>

</body>
</html>
