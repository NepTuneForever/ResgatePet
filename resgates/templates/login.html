<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.header {
  background: #2f5d8c;
  color: white;
  padding: 20px;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

/* CARD */
.card {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 16px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-family: inherit;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 12px;
  background: #f4c542;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

/* LINK */
.link {
  text-align: center;
  margin-top: 10px;
}

.link a {
  color: #2f5d8c;
  text-decoration: none;
  font-weight: 500;
}

/* ERRO */
.erro {
  color: red;
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="header">
  <h1>🔐 Login</h1>
</div>

<div class="card">
  <form method="POST">
    {% csrf_token %}

    {% if erro %}
      <div class="erro">{{ erro }}</div>
    {% endif %}

    <input type="text" name="username" placeholder="Usuário">
    <input type="password" name="password" placeholder="Senha">

    <button type="submit">Entrar</button>
  </form>

  <div class="link">
    <a href="/register/">Criar conta</a>
  </div>
  <div class="link">
    <a href="/recuperar/">Esqueci minha senha</a>
  </div>
</div>

</body>
</html>
