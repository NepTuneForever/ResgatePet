<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastrar Pet</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #f2f2f2;
}

/* HEADER */
.header {
  background: #2f5d8c;
  color: white;
  padding: 16px;
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* USER MENU */
.user-menu {
  position: relative;
}

.user-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid white;
}

.user-btn img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.dropdown {
  position: absolute;
  right: 0;
  top: 45px;
  background: white;
  border-radius: 12px;
  padding: 10px;
  min-width: 140px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  display: none;
}

.dropdown.active {
  display: block;
}

.dropdown p {
  font-size: 14px;
  margin-bottom: 8px;
  color: #333;
}

.dropdown button {
  width: 100%;
  padding: 8px;
  border: none;
  background: #f44336;
  color: white;
  border-radius: 8px;
}

/* FORM */
.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 16px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.tipo-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.tipo-buttons input {
  display: none;
}

.btn-tipo {
  padding: 10px 16px;
  border-radius: 999px;
  background: #e0e0e0;
  cursor: pointer;
}

.tipo-buttons input:checked + .btn-tipo {
  background: #2f5d8c;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: #f4c542;
  border: none;
  border-radius: 12px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>🐾 Cadastrar Pet</h1>

    <div class="user-menu">
      <div class="user-btn" onclick="toggleMenu()">
        <img src="https://i.imgur.com/6VBx3io.png">
      </div>

      <div class="dropdown" id="dropdown">
        <p>
          {% if request.user.is_authenticated %}
            {{ request.user.username }}
          {% else %}
            Visitante
          {% endif %}
        </p>

        <form method="POST" action="/logout/">
          {% csrf_token %}
          <button type="submit">🚪 Logout</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="card">
  <form method="POST">
    {% csrf_token %}

    <div class="tipo-buttons">
      <input type="radio" name="tipo" value="Cachorro" id="t1" required>
      <label for="t1" class="btn-tipo">🐕 Cachorro</label>

      <input type="radio" name="tipo" value="Gato" id="t2">
      <label for="t2" class="btn-tipo">🐈 Gato</label>

      <input type="radio" name="tipo" value="Outro" id="t3">
      <label for="t3" class="btn-tipo">🐾 Outro</label>
    </div>

    <input type="text" name="nome" placeholder="Nome" required>
    <input type="number" name="idade" placeholder="Idade" required>
    <textarea name="caracteristicas" placeholder="Características" required></textarea>
    <input type="text" name="localizacao" placeholder="Localização" required>
    <input type="text" name="contato" placeholder="Contato" required>
    <input type="url" name="foto" placeholder="URL da Foto" required>

    <button type="submit">Cadastrar</button>
  </form>
</div>

<script>
function toggleMenu() {
  document.getElementById("dropdown").classList.toggle("active");
}

document.addEventListener("click", function(e) {
  const menu = document.getElementById("dropdown");
  const btn = document.querySelector(".user-btn");

  if (!btn.contains(e.target) && !menu.contains(e.target)) {
    menu.classList.remove("active");
  }
});
</script>

</body>
</html>
